<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div id="siteNav"></div>
  <main class="container-main">
    <section class="mb-5">
      <h2 style="font-size: 2.5rem;">Explore Collections</h2>
      <p class="lead text-muted">Discover our wide range of products across all categories.</p>
    </section>
    <section class="card-grid" id="catsArea">
      <div class="card-ui">
        <h5>Scanning cosmic sectors...</h5>
      </div>
    </section>
  </main>
  <div id="siteFooter"></div>

  <script type="module">
    import { updateNav, fetchJson, redirectIfNotLoggedIn } from '/js/common.js';
    await updateNav();
    redirectIfNotLoggedIn();

    const fallback = [
      { id: 'electronics', name: 'Electronics', icon: '⚡', description: 'Phones, laptops & gadgets' },
      { id: 'fashion', name: 'Fashion', icon: '👗', description: 'Trendy outfits & accessories' },
      { id: 'home', name: 'Home & Kitchen', icon: '🏡', description: 'Cookware, decor & comfort' },
      { id: 'beauty', name: 'Beauty', icon: '💄', description: 'Skincare & cosmetics' },
      { id: 'sports', name: 'Sports', icon: '🏀', description: 'Gear to stay active' }
    ];

    async function loadCategories() {
      const el = document.getElementById('catsArea');
      const res = await fetchJson('/api/categories');

      const iconMap = {
        'electronics': '⚡',
        'fashion': '👗',
        'home & kitchen': '🏡',
        'beauty & personal care': '💄',
        'sports & outdoors': '🏀',
        'books & stationery': '📚'
      };

      if (!res.ok || !Array.isArray(res.categories) || !res.categories.length) {
        renderCards(fallback, el);
        return;
      }

      const mapped = res.categories.map(cat => {
        const nameKey = cat.name.toLowerCase();
        return {
          id: cat.id || cat.category_id,
          name: cat.name,
          description: cat.description || 'Discover handpicked items',
          icon: iconMap[nameKey] || '🛒'
        };
      });
      renderCards(mapped, el);
    }

    function renderCards(list, container) {
      container.innerHTML = list.map(cat => `
        <div class="card-ui text-center" style="cursor: pointer;" data-id="${cat.id}">
          <div class="cat-icon mb-3" style="font-size: 2.5rem;">${cat.icon || '🛒'}</div>
          <h4>${cat.name}</h4>
          <p class="text-muted small mb-4">${cat.description}</p>
          <button class="btn btn-secondary w-100">Browse</button>
        </div>
      `).join('');
      container.querySelectorAll('.card-ui').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          if (id && id !== 'undefined') location.href = `/products.html?category_id=${id}`;
          else location.href = '/products.html';
        });
      });
    }

    loadCategories();
  </script>
</body>

</html>
