<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="auth-page">
  <div id="siteNav"></div>
  <main class="container-main d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card-ui p-5" style="max-width: 550px; width: 100%;">
      <h2 class="text-center mb-4" style="font-size: 2.5rem;">Create Account</h2>
      <p class="text-center text-muted mb-5">Join our shopping community and start exploring.</p>
      <form id="regForm" class="auth-form">
        <div class="row g-4">
          <div class="col-12">
            <input class="form-control w-100" id="full_name" name="full_name" placeholder="Full Display Name" required>
          </div>
          <div class="col-md-6">
            <input class="form-control w-100" id="email" type="email" name="email" placeholder="Email Address" required>
          </div>
          <div class="col-md-6">
            <input class="form-control w-100" id="phone" name="phone" placeholder="Active Phone" required>
          </div>
          <div class="col-md-6">
            <input class="form-control w-100" id="password" type="password" name="password"
              placeholder="Secure Password" required>
          </div>
          <div class="col-md-6">
            <input class="form-control w-100" id="confirm_password" type="password" placeholder="Confirm" required>
          </div>
        </div>
        <button class="btn w-100 mt-5" type="submit">Register</button>
      </form>
      <div id="msg" class="form-status text-center mt-3"></div>
      <p class="text-center text-muted small mt-5">Already have an account? <a href="/login.html" class="fw-bold"
          style="text-decoration: none;">Login Here</a></p>
    </div>
  </main>
  <div id="siteFooter"></div>

  <script type="module">
    import { updateNav, fetchJson, isLoggedIn } from '/js/common.js';
    await updateNav();
    if (isLoggedIn()) { location.href = '/categories.html'; }

    const form = document.getElementById('regForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      msg.textContent = 'Creating account...';
      const formData = new FormData(form);
      if (formData.get('password') !== document.getElementById('confirm_password').value) {
        msg.textContent = 'Passwords do not match.';
        return;
      }
      const data = Object.fromEntries(formData.entries());
      const res = await fetchJson('/api/auth/register', { method: 'POST', body: data });
      if (res.ok) {
        msg.textContent = 'Registered successfully. Redirecting to login...';
        setTimeout(() => location.href = '/login.html', 1200);
      } else {
        msg.textContent = res.message || 'Unable to register';
      }
    });
  </script>
</body>

</html>
