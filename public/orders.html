<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>My Orders • Happy Shopping</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div id="siteNav"></div>
  <main class="container-main">
    <section class="card-ui p-5">
      <h3 class="mb-4" style="font-size: 2.5rem;">Order History</h3>
      <div id="ordersList" class="mt-4">
        <div class="text-center py-5">
          <p class="mt-2">Loading your orders...</p>
        </div>
      </div>
    </section>
  </main>
  <script type="text/template" id="order-card-template">
      <div class="card-ui mb-5 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">Order #${order_id}</h4>
          <span class="badge">${order_status}</span>
        </div>
        <p class="mb-2 small text-muted">Placed on ${orderDate}</p>
        <p class="mb-4" style="font-size: 1.5rem; font-weight: 700;">${total_amount}</p>
        
        <div class="mb-4 p-3 rounded" style="background: #f8fafc;">
          <p class="mb-2 small text-uppercase" style="letter-spacing: 0.1em; opacity: 0.7;">Item Details</p>
          <div class="small">
            ${items_list}
          </div>
        </div>

        <div class="d-flex gap-3">
          <a href="/billing.html?order_id=${order_id}" class="btn">View Invoice</a>
        </div>
      </div>
    </script>


  <script type="module">
    import { updateNav, redirectIfNotLoggedIn, formatCurrency, fetchJson } from '/js/common.js';
    await updateNav();
    redirectIfNotLoggedIn();

    const ordersList = document.getElementById('ordersList');

    async function loadOrders() {
      try {
        const res = await fetchJson('/api/orders');
        if (!res.ok) {
          ordersList.innerHTML = `<div class="notice">Error: ${res.message || 'Failed to load orders'}</div>`;
          return;
        }

        const orders = res.orders || [];
        if (orders.length === 0) {
          ordersList.innerHTML = `
            <div class="text-center py-5">
              <p class="lead text-muted">You haven't placed any orders yet.</p>
              <a href="/products.html" class="btn mt-3">Start Shopping</a>
            </div>
          `;
          return;
        }

        ordersList.innerHTML = orders.map(order => {
          const orderDate = new Date(order.order_date).toLocaleString('en-IN', { dateStyle: 'long', timeStyle: 'short' });

          // Use simple template replacement
          let html = document.getElementById('order-card-template').innerHTML;
          html = html.replace(/\${order_id}/g, order.order_id);
          html = html.replace(/\${order_status}/g, order.order_status);
          html = html.replace(/\${orderDate}/g, orderDate);
          html = html.replace(/\${total_amount}/g, formatCurrency(order.total_amount));
          html = html.replace(/\${items_list}/g, order.items.map(item => `${item.product_name} (x${item.quantity})`).join(', '));
          return html;
        }).join('');

      } catch (err) {
        console.error('loadOrders error:', err);
        ordersList.innerHTML = `<div class="alert alert-danger">Server error occurred while loading orders.</div>`;
      }
    }

    function getStatusColor(status) {
      switch (status) {
        case 'PLACED': return 'primary';
        case 'SHIPPED': return 'info';
        case 'DELIVERED': return 'success';
        case 'CANCELLED': return 'danger';
        default: return 'secondary';
      }
    }

    loadOrders();
  </script>
</body>

</html>
