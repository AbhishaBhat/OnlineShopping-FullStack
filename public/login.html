<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Login • Happy Shopping</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="auth-page">
  <div id="siteNav"></div>
  <main class="container-main d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card-ui p-5" style="max-width: 480px; width: 100%;">
      <h2 class="text-center mb-4" style="font-size: 2.5rem;">Login</h2>
      <p class="text-center text-muted mb-5">Welcome back to Happy Shopping.</p>
      <form id="loginForm" class="auth-form">
        <div class="mb-4">
          <input class="form-control w-100" name="email" type="email" placeholder="Email address" required>
        </div>
        <div class="mb-5">
          <input class="form-control w-100" name="password" type="password" placeholder="Password" required>
        </div>
        <button class="btn w-100" type="submit">Sign In</button>
      </form>
      <div id="msg" class="form-status text-center mt-3"></div>
      <p class="text-center text-muted small mt-5">New customer? <a href="/register.html" class="fw-bold"
          style="text-decoration: none;">Create Account</a></p>
    </div>
  </main>
  <div id="siteFooter"></div>

  <script type="module">
    import { updateNav, fetchJson, isLoggedIn } from '/js/common.js';
    await updateNav();
    if (isLoggedIn()) { location.href = '/categories.html'; }
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      msg.textContent = 'Signing you in...';
      const body = Object.fromEntries(new FormData(form).entries());
      const res = await fetchJson('/api/auth/login', { method: 'POST', body });
      if (res.ok && res.token) {
        localStorage.setItem('token', res.token);
        msg.textContent = 'Login successful! Redirecting...';
        setTimeout(() => location.href = '/categories.html', 900);
      } else {
        msg.textContent = res.message || 'Login failed. Please try again.';
      }
    });
  </script>
</body>

</html>
