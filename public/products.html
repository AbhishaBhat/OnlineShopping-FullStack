<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div id="siteNav"></div>
  <main class="container-main">
    <div class="mt-4"><a href="/categories.html" class="small">← Back</a>
      <h3 id="catTitle">Products</h3>
      <div id="prodList" class="card-grid">Loading...</div>
    </div>
  </main>
  <div id="siteFooter"></div>
  <script type="module">
    import {
      updateNav,
      fetchJson,
      isLoggedIn,
      redirectIfNotLoggedIn,
      updateNavCounts,
      formatCurrency,
      addToCart
    } from '/js/common.js';

    await updateNav();
    redirectIfNotLoggedIn();

    const params = new URLSearchParams(location.search);
    const cid = params.get('category_id') || params.get('cat');
    const searchQuery = params.get('q');
    const title = document.getElementById('catTitle');
    const list = document.getElementById('prodList');
    let currentProducts = [];

    async function loadProducts() {
      list.innerHTML = '<div class="product"><h6>Loading...</h6></div>';

      if (searchQuery) {
        title.innerHTML = `Search results for "<span class="text-gradient">${searchQuery}</span>"`;
        const url = `/api/products?q=${encodeURIComponent(searchQuery)}&limit=50`;
        const resp = await fetchJson(url);
        if (!resp.ok) {
          list.innerHTML = `<div class="notice">${resp.message || 'Unable to load products'}</div>`;
          return;
        }
        currentProducts = resp.products || [];
        renderList(currentProducts);
        return;
      }

      if (!cid) {
        title.textContent = 'All products';
        const all = await fetchJson('/api/products?limit=50');
        if (!all.ok) {
          list.innerHTML = `<div class="notice">${all.message || 'Unable to load products'}</div>`;
          return;
        }
        currentProducts = all.products || [];
        renderList(currentProducts);
        return;
      }

      const resp = await fetchJson(`/api/categories/${cid}/products`);
      if (!resp.ok) {
        list.innerHTML = `<div class="notice">${resp.message || 'Unable to load category'}</div>`;
        return;
      }
      let catName = `Category`;
      const cats = await fetchJson('/api/categories');
      if (cats.ok && Array.isArray(cats.categories)) {
        const found = cats.categories.find(c => String(c.id) === String(cid));
        if (found) catName = found.name;
      }
      title.textContent = catName;
      currentProducts = resp.products || [];
      renderList(currentProducts);
    }

    function renderList(items) {
      if (!items.length) {
        list.innerHTML = '<div class="notice">No products in this category.</div>';
        return;
      }
      list.innerHTML = items.map(p => `
        <div class="card-ui">
          <div class="product-image-wrapper">
            <img src="${p.image_url || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500'}" alt="${p.name}" class="product-image">
          </div>
          <div class="mb-4">
            <h4 class="mb-2" style="font-size: 1.5rem;">${p.name}</h4>
            <div class="badge">${formatCurrency(p.price)}</div>
          </div>
          <p class="text-muted small mb-4" style="min-height: 48px;">${p.description || 'Quality product for all your needs.'}</p>
          <div class="d-flex gap-3">
            <button class="btn add flex-grow-1" data-id="${p.id}">Add to Cart</button>
            <button class="btn btn-secondary wish" data-id="${p.id}" style="padding: 16px;">❤️</button>
          </div>
          <div class="mt-3 small" style="opacity: 0.5;">Stock: ${p.stock} Units</div>
        </div>
      `).join('');
      bindProductActions();
    }

    function bindProductActions() {
      document.querySelectorAll('.add').forEach(b => b.addEventListener('click', async e => {
        if (!isLoggedIn()) return location.href = '/login.html';
        const id = Number(e.currentTarget.dataset.id);
        const res = await addToCart(id, 1);
        if (res.message || res.ok) alert(res.message || (res.ok ? 'Added to cart' : 'Unable to add'));
        if (res.ok) {
          await updateNavCounts();
          // UI update: decrease local stock display
          const card = e.currentTarget.closest('.card-ui');
          const stockEl = card.querySelector('.mt-3.small');
          if (stockEl) {
            const match = stockEl.textContent.match(/Stock:\s*(\d+)/);
            if (match) {
              const currentStock = parseInt(match[1], 10);
              stockEl.textContent = `Stock: ${Math.max(0, currentStock - 1)} Units`;
            }
          }
        }
      }));
      document.querySelectorAll('.wish').forEach(b => b.addEventListener('click', async e => {
        if (!isLoggedIn()) return location.href = '/login.html';
        const id = Number(e.currentTarget.dataset.id);
        const res = await fetchJson('/api/wishlist', {
          method: 'POST',
          body: { product_id: id }
        });
        if (res.message || res.ok) alert(res.message || (res.ok ? 'Saved to wishlist' : 'Unable to save'));
        if (res.ok) await updateNavCounts();
      }));
    }

    await loadProducts();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
